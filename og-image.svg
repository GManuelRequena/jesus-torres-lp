<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Fondo -->
  <rect width="1200" height="630" fill="#0A0A0A"/>

  <!-- Gradiente de fondo -->
  <defs>
    <radialGradient id="glow1" cx="80%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF5C00" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#FFE000" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Texto FITNESS de fondo decorativo -->
  <text x="600" y="420" font-family="Arial Black, sans-serif" font-size="300" font-weight="900"
        fill="none" stroke="#FFE000" stroke-width="1" stroke-opacity="0.06"
        text-anchor="middle" letter-spacing="10">FITNESS</text>

  <!-- Pesas — lado izquierdo -->
  <!-- Barra -->
  <rect x="80" y="305" width="200" height="20" rx="4" fill="#FFE000" opacity="0.9"/>
  <!-- Peso izquierdo exterior -->
  <rect x="60" y="275" width="28" height="80" rx="6" fill="#FF5C00"/>
  <!-- Peso izquierdo interior -->
  <rect x="92" y="285" width="18" height="60" rx="4" fill="#FF5C00" opacity="0.8"/>
  <!-- Peso derecho interior -->
  <rect x="250" y="285" width="18" height="60" rx="4" fill="#FF5C00" opacity="0.8"/>
  <!-- Peso derecho exterior -->
  <rect x="272" y="275" width="28" height="80" rx="6" fill="#FF5C00"/>

  <!-- Línea separadora izquierda -->
  <rect x="80" y="180" width="3" height="270" fill="#FFE000" opacity="0.15" rx="2"/>

  <!-- Badge EP -->
  <rect x="110" y="160" width="80" height="32" rx="3" fill="#FF5C00"/>
  <text x="150" y="181" font-family="Arial, sans-serif" font-size="14" font-weight="700"
        fill="white" text-anchor="middle" letter-spacing="3">EP</text>

  <!-- Nombre -->
  <text x="420" y="290" font-family="Arial Black, sans-serif" font-size="100" font-weight="900"
        fill="white" text-anchor="middle" letter-spacing="4">JESÚS</text>
  <text x="420" y="390" font-family="Arial Black, sans-serif" font-size="100" font-weight="900"
        fill="#FFE000" text-anchor="middle" letter-spacing="4">TORRES</text>

  <!-- Subtítulo -->
  <text x="420" y="440" font-family="Arial, sans-serif" font-size="22" font-weight="600"
        fill="#888" text-anchor="middle" letter-spacing="5">ENTRENADOR PERSONAL</text>

  <!-- Línea separadora derecha -->
  <rect x="700" y="180" width="3" height="270" fill="#FFE000" opacity="0.15" rx="2"/>

  <!-- Pesas — lado derecho (espejo) -->
  <rect x="920" y="305" width="200" height="20" rx="4" fill="#FFE000" opacity="0.9"/>
  <rect x="900" y="275" width="28" height="80" rx="6" fill="#E8003A"/>
  <rect x="932" y="285" width="18" height="60" rx="4" fill="#E8003A" opacity="0.8"/>
  <rect x="1090" y="285" width="18" height="60" rx="4" fill="#E8003A" opacity="0.8"/>
  <rect x="1112" y="275" width="28" height="80" rx="6" fill="#E8003A"/>

  <!-- Stats -->
  <text x="780" y="270" font-family="Arial Black, sans-serif" font-size="48" font-weight="900"
        fill="#FFE000" text-anchor="middle">+100</text>
  <text x="780" y="300" font-family="Arial, sans-serif" font-size="14" font-weight="600"
        fill="#666" text-anchor="middle" letter-spacing="3">ALUMNOS</text>

  <text x="780" y="370" font-family="Arial Black, sans-serif" font-size="48" font-weight="900"
        fill="#FF5C00" text-anchor="middle">5+</text>
  <text x="780" y="400" font-family="Arial, sans-serif" font-size="14" font-weight="600"
        fill="#666" text-anchor="middle" letter-spacing="3">AÑOS DE EXP.</text>

  <!-- URL -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="18"
        fill="#444" text-anchor="middle" letter-spacing="2">entrenadorjesustorres.netlify.app</text>

  <!-- Línea inferior decorativa -->
  <rect x="0" y="610" width="1200" height="4" fill="url(#gradLine)"/>
  <defs>
    <linearGradient id="gradLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFE000"/>
      <stop offset="50%" stop-color="#FF5C00"/>
      <stop offset="100%" stop-color="#E8003A"/>
    </linearGradient>
  </defs>
</svg>
