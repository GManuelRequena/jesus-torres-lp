name: Tag Release

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write

concurrency:
  group: tag-release
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Crear tag de release
        env:
          TZ: UTC
        run: |
          DATE=$(date +'%Y.%m.%d')
          BASE_TAG="v${DATE}"

          # Usar refs/tags/ explícito para evitar falsos positivos con ramas
          TAG="$BASE_TAG"
          N=1
          while git show-ref --tags --verify --quiet "refs/tags/$TAG"; do
            N=$((N + 1))
            TAG="${BASE_TAG}-${N}"
          done

          git tag "$TAG"
          git push origin "$TAG"
          echo "Tag creado: $TAG"
