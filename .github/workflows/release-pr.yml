name: Release PR

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: release-pr
  cancel-in-progress: false

jobs:
  release-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Crear o actualizar PR de release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin main develop

          BASE=$(git merge-base origin/main origin/develop)
          COMMITS=$(git log "$BASE"..origin/develop --pretty=format:"%s" --no-merges)

          if [ -z "$COMMITS" ]; then
            echo "No hay commits nuevos respecto a main. Nada que hacer."
            exit 0
          fi

          FEATS=$(echo "$COMMITS"  | grep "^feat"          | sed 's/^feat[^:]*: //' | sed 's/^/- /' || true)
          FIXES=$(echo "$COMMITS"  | grep "^fix"           | sed 's/^fix[^:]*: //'  | sed 's/^/- /' || true)
          OTHERS=$(echo "$COMMITS" | grep -v "^feat\|^fix" | sed 's/^/- /'          || true)

          DATE=$(date +'%Y-%m-%d')
          BODY="## Release ${DATE}"$'\n\n'

          if [ -n "$FEATS" ]; then
            BODY+="### Nuevas features"$'\n'"${FEATS}"$'\n\n'
          fi
          if [ -n "$FIXES" ]; then
            BODY+="### Fixes"$'\n'"${FIXES}"$'\n\n'
          fi
          if [ -n "$OTHERS" ]; then
            BODY+="### Otros cambios"$'\n'"${OTHERS}"$'\n\n'
          fi

          BODY+="---"$'\n'"_Generado automáticamente. Revisá los cambios antes de aprobar._"

          PR=$(gh pr list --base main --head develop --state open --json number --jq '.[0].number // ""')

          if [ -z "$PR" ]; then
            gh pr create \
              --base main \
              --head develop \
              --title "Release ${DATE}" \
              --body "$BODY"
            PR=$(gh pr list --base main --head develop --state open --json number --jq '.[0].number')
            echo "PR de release creado (#${PR})."
          else
            gh pr edit "$PR" \
              --title "Release ${DATE}" \
              --body "$BODY"
            echo "PR de release actualizado (PR #${PR})."
          fi

          # Solicitar review de Copilot (no bloqueante)
          gh api \
            repos/${{ github.repository }}/pulls/${PR}/requested_reviewers \
            --method POST \
            --field "reviewers[]=copilot" \
            || echo "No se pudo solicitar review de Copilot (puede que no esté habilitado en el repo)."
