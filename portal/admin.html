<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Jesús Torres EP</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="portal.css"/>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

  <nav>
    <div style="display:flex;align-items:center;gap:0.5rem">
      <a href="/" class="nav-logo">Jesús Torres · EP</a>
      <span class="nav-badge">ADMIN</span>
    </div>
    <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
  </nav>

  <main class="dashboard-page" id="admin-page" style="display:none">

    <div class="dashboard-header fade-in">
      <div class="dashboard-greeting">Panel de administración</div>
      <div class="dashboard-title">GESTIÓN DE <span style="color:var(--yellow)">ALUMNOS</span></div>
    </div>

    <div class="routine-card fade-in">

      <div class="tabs">
        <button class="tab-btn active" data-tab="alumnos">
          Alumnos <span id="admin-count"></span>
        </button>
        <button class="tab-btn" data-tab="invitar">Invitar</button>
      </div>

      <div class="tab-panels">

        <!-- Tab: lista de alumnos -->
        <div class="tab-panel active" data-panel="alumnos">
          <div id="students-container">
            <div class="loading-state">
              <div class="spinner"></div>
              <span>Cargando alumnos...</span>
            </div>
          </div>
        </div>

        <!-- Tab: invitar nuevo alumno -->
        <div class="tab-panel" data-panel="invitar">
          <div class="routine-section">
            <div class="section-label">Nuevo alumno</div>
            <form id="invite-form" class="invite-form">
              <div class="field-group">
                <label class="field-label" for="invite-full-name">Nombre completo</label>
                <input class="field-input" id="invite-full-name" type="text" name="full_name" placeholder="Juan Pérez" />
              </div>
              <div class="field-group">
                <label class="field-label" for="invite-email">Email</label>
                <input class="field-input" id="invite-email" type="email" name="email" placeholder="juan@email.com" required />
              </div>
              <div class="invite-form-footer">
                <button type="submit" class="btn-save" id="btn-invite">Enviar invitación</button>
                <span class="form-msg" id="invite-msg"></span>
              </div>
            </form>
          </div>
        </div>

      </div>
    </div>

  </main>

  <script>
    netlifyIdentity.init();

    netlifyIdentity.on('init', user => {
      if (!user) {
        window.location.href = '/portal/';
        return;
      }
      const roles = user.app_metadata?.roles || [];
      if (!roles.includes('admin')) {
        window.location.href = '/portal/dashboard.html';
        return;
      }
      document.getElementById('admin-page').style.display = 'block';
      initTabs();
      initContainerListeners();
      loadStudents();
    });

    document.getElementById('btn-logout').addEventListener('click', () => {
      netlifyIdentity.logout();
    });

    netlifyIdentity.on('logout', () => {
      window.location.href = '/portal/';
    });

    // ── Tabs ─────────────────────────────────────────────────────────────────
    function initTabs() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          document.querySelector(`.tab-panel[data-panel="${btn.dataset.tab}"]`).classList.add('active');
        });
      });
    }

    // ── Listeners del container (se registran una sola vez) ──────────────────
    function initContainerListeners() {
      const container = document.getElementById('students-container');

      // Extraer Google Doc ID al pegar en el campo docId
      container.addEventListener('paste', e => {
        const input = e.target.closest('[data-field="docId"]');
        if (!input) return;
        const pasted = (e.clipboardData || window.clipboardData).getData('text');
        const extracted = extractDocId(pasted);
        if (extracted !== pasted) {
          e.preventDefault();
          input.value = extracted;
        }
      });

      // Delegación de clicks para toda la lista
      container.addEventListener('click', e => {

        // ── Toggle sección archivados ────────────────────────────────────────
        const toggleBtn = e.target.closest('#btn-toggle-archived');
        if (toggleBtn) {
          const list    = document.getElementById('archived-list');
          const chevron = document.querySelector('.archived-chevron');
          const isOpen  = !list.hidden;
          list.hidden   = isOpen;
          chevron.style.transform = isOpen ? '' : 'rotate(90deg)';
          return;
        }

        // ── Sub-tabs del alumno ──────────────────────────────────────────────
        const subTabBtn = e.target.closest('.student-tab-btn');
        if (subTabBtn) {
          const uid    = subTabBtn.dataset.uid;
          const subtab = subTabBtn.dataset.subtab;
          const body   = subTabBtn.closest('.student-body');
          body.querySelectorAll('.student-tab-btn').forEach(b => b.classList.remove('active'));
          body.querySelectorAll('.student-tab-panel').forEach(p => { p.hidden = true; });
          subTabBtn.classList.add('active');
          body.querySelector(`.student-tab-panel[data-subtab="${subtab}"]`).hidden = false;
          if (subtab === 'rutina') {
            const rePanel = document.getElementById(`re-panel-${uid}`);
            if (!rePanel.querySelector('.re-editor')) loadRoutineTab(uid);
          }
          return;
        }

        // ── Tabs de días en el editor ────────────────────────────────────────
        const reDayBtn = e.target.closest('.re-day-btn');
        if (reDayBtn) {
          const uid    = reDayBtn.dataset.uid;
          const newIdx = parseInt(reDayBtn.dataset.day);
          const editor = reDayBtn.closest('.re-editor');

          if (reDayBtn.classList.contains('active') && routineStates[uid]?.dias.length > 1) {
            const diaLabel = routineStates[uid].dias[newIdx]?.label || `Día ${newIdx + 1}`;
            if (!confirm(`¿Eliminar ${diaLabel}? Se perderá su contenido.`)) return;
            syncRoutineStateFromDOM(uid);
            routineStates[uid].dias.splice(newIdx, 1);
            routineStates[uid].dias.forEach((d, i) => { d.label = `Día ${i + 1}`; });
            const newActive = Math.min(newIdx, routineStates[uid].dias.length - 1);
            renderRoutineEditor(uid, newActive);
            return;
          }

          editor.querySelectorAll('.re-day-btn').forEach(b => b.classList.remove('active'));
          editor.querySelectorAll('.re-day-panel').forEach(p => p.classList.add('re-day-panel--hidden'));
          reDayBtn.classList.add('active');
          editor.querySelector(`.re-day-panel[data-uid="${uid}"][data-day="${newIdx}"]`)
            ?.classList.remove('re-day-panel--hidden');
          return;
        }

        // ── Agregar día ──────────────────────────────────────────────────────
        const addDayBtn = e.target.closest('.re-add-day-btn');
        if (addDayBtn) {
          const uid = addDayBtn.dataset.uid;
          if (!routineStates[uid] || routineStates[uid].dias.length >= 6) return;
          syncRoutineStateFromDOM(uid);
          const newIdx = routineStates[uid].dias.length;
          routineStates[uid].dias.push({ label: `Día ${newIdx + 1}`, movilidad: [], calor: [], principal: [] });
          renderRoutineEditor(uid, newIdx);
          return;
        }

        // ── Agregar ítem de movilidad ────────────────────────────────────────
        const addMovBtn = e.target.closest('.re-add-mov-btn');
        if (addMovBtn) {
          const uid    = addMovBtn.dataset.uid;
          const dayIdx = parseInt(addMovBtn.dataset.day);
          syncRoutineStateFromDOM(uid);
          routineStates[uid].dias[dayIdx].movilidad.push({ nombre: '', youtubeUrl: null });
          document.getElementById(`re-movilidad-${uid}-${dayIdx}`).innerHTML = renderMovilidadItems(uid, dayIdx);
          return;
        }

        // ── Agregar ítem de calor ────────────────────────────────────────────
        const addCalorBtn = e.target.closest('.re-add-calor-btn');
        if (addCalorBtn) {
          const uid    = addCalorBtn.dataset.uid;
          const dayIdx = parseInt(addCalorBtn.dataset.day);
          syncRoutineStateFromDOM(uid);
          routineStates[uid].dias[dayIdx].calor.push({ nombre: '' });
          document.getElementById(`re-calor-${uid}-${dayIdx}`).innerHTML = renderCalorItems(uid, dayIdx);
          return;
        }

        // ── Agregar ejercicio en parte principal ─────────────────────────────
        const addExBtn = e.target.closest('.re-add-ex-btn');
        if (addExBtn) {
          const uid    = addExBtn.dataset.uid;
          const dayIdx = parseInt(addExBtn.dataset.day);
          syncRoutineStateFromDOM(uid);
          const n = routineStates[uid].dias[dayIdx].principal.length + 1;
          routineStates[uid].dias[dayIdx].principal.push({
            num: n, nombre: '', series: null, reps: null, unidad: 'reps',
            peso: null, pesoUnidad: 'kg', nota: null, youtubeUrl: null,
          });
          document.getElementById(`re-principal-${uid}-${dayIdx}`).innerHTML = renderPrincipalItems(uid, dayIdx);
          return;
        }

        // ── Eliminar ítem (movilidad / calor / principal) ────────────────────
        const delBtn = e.target.closest('.re-del-btn');
        if (delBtn) {
          const uid     = delBtn.dataset.uid;
          const dayIdx  = parseInt(delBtn.dataset.day);
          const section = delBtn.dataset.section;
          const idx     = parseInt(delBtn.dataset.idx);
          syncRoutineStateFromDOM(uid);
          routineStates[uid].dias[dayIdx][section].splice(idx, 1);
          const renderFn = section === 'movilidad' ? renderMovilidadItems
                         : section === 'calor'      ? renderCalorItems
                         :                            renderPrincipalItems;
          document.getElementById(`re-${section}-${uid}-${dayIdx}`).innerHTML = renderFn(uid, dayIdx);
          return;
        }

        // ── Agregar semana de periodización ─────────────────────────────────
        const addPeriodBtn = e.target.closest('.re-add-period-btn');
        if (addPeriodBtn) {
          const uid = addPeriodBtn.dataset.uid;
          syncRoutineStateFromDOM(uid);
          const n = routineStates[uid].periodizacion.length + 1;
          routineStates[uid].periodizacion.push({ semana: n, descripcion: '' });
          document.getElementById(`re-period-${uid}`).innerHTML = renderPeriodItems(uid);
          return;
        }

        // ── Eliminar semana de periodización ─────────────────────────────────
        const delPeriodBtn = e.target.closest('.re-del-period-btn');
        if (delPeriodBtn) {
          const uid = delPeriodBtn.dataset.uid;
          const idx = parseInt(delPeriodBtn.dataset.idx);
          syncRoutineStateFromDOM(uid);
          routineStates[uid].periodizacion.splice(idx, 1);
          routineStates[uid].periodizacion.forEach((p, i) => { p.semana = i + 1; });
          document.getElementById(`re-period-${uid}`).innerHTML = renderPeriodItems(uid);
          return;
        }

        // ── Toggle unidad reps/seg ────────────────────────────────────────────
        const toggleUnidad = e.target.closest('.re-toggle-unidad');
        if (toggleUnidad) {
          const row  = toggleUnidad.closest('.re-ex-row');
          const next = row.dataset.unidad === 'reps' ? 'seg' : 'reps';
          row.dataset.unidad    = next;
          toggleUnidad.textContent = next;
          return;
        }

        // ── Toggle unidad de peso kg/lingotes ─────────────────────────────────
        const togglePeso = e.target.closest('.re-toggle-peso');
        if (togglePeso) {
          const row  = togglePeso.closest('.re-ex-row');
          const next = row.dataset.pesoUnidad === 'kg' ? 'lingotes' : 'kg';
          row.dataset.pesoUnidad = next;
          togglePeso.textContent = next;
          return;
        }

        // ── Expandir campos extra del ejercicio ───────────────────────────────
        const expandBtn = e.target.closest('.re-ex-expand-btn');
        if (expandBtn) {
          const row   = expandBtn.closest('.re-ex-row');
          const extra = row.querySelector('.re-ex-extra');
          const open  = extra.classList.toggle('re-ex-extra--hidden');
          expandBtn.textContent = open ? '▼ nota/url' : '▲ menos';
          return;
        }

        // ── Guardar rutina ────────────────────────────────────────────────────
        const reSaveBtn = e.target.closest('.re-save-btn');
        if (reSaveBtn) { saveRoutine(reSaveBtn.dataset.uid); return; }

        // ── Guardar datos generales ───────────────────────────────────────────
        const saveBtn = e.target.closest('.student-save-btn');
        if (saveBtn) { saveStudent(saveBtn.dataset.id); return; }

        // ── Agregar pesaje ────────────────────────────────────────────────────
        const addPesajeBtn = e.target.closest('.pesaje-add-btn');
        if (addPesajeBtn) { addPesaje(addPesajeBtn.dataset.id); return; }

        // ── Eliminar pesaje ───────────────────────────────────────────────────
        const delPesajeBtn = e.target.closest('.pesaje-del');
        if (delPesajeBtn) {
          deletePesaje(delPesajeBtn.dataset.uid, parseInt(delPesajeBtn.dataset.idx));
          return;
        }

        // ── Archivar alumno ───────────────────────────────────────────────────
        const archiveBtn = e.target.closest('.student-archive-btn');
        if (archiveBtn) {
          const name = archiveBtn.closest('.student-item').querySelector('.student-name').textContent;
          if (confirm(`¿Archivar a ${name}?\nPerderá acceso al portal.`)) {
            setArchived(archiveBtn.dataset.id, true);
          }
          return;
        }

        // ── Reactivar alumno ──────────────────────────────────────────────────
        const reactivateBtn = e.target.closest('.student-reactivate-btn');
        if (reactivateBtn) { setArchived(reactivateBtn.dataset.id, false); return; }
      });
    }

    // ── Acordeón ─────────────────────────────────────────────────────────────
    function initAccordion() {
      document.querySelectorAll('.student-row').forEach(btn => {
        btn.addEventListener('click', () => {
          const item   = btn.closest('.student-item');
          const body   = item.querySelector('.student-body');
          const isOpen = btn.getAttribute('aria-expanded') === 'true';

          document.querySelectorAll('.student-row[aria-expanded="true"]').forEach(other => {
            if (other !== btn) {
              other.setAttribute('aria-expanded', 'false');
              other.closest('.student-item').querySelector('.student-body').hidden = true;
            }
          });

          btn.setAttribute('aria-expanded', String(!isOpen));
          body.hidden = isOpen;
        });
      });
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    async function getToken() {
      return await netlifyIdentity.currentUser().jwt();
    }

    function esc(str) {
      return String(str ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatFecha(iso) {
      if (!iso) return '—';
      const [y, m, d] = iso.split('-');
      const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
      return `${parseInt(d)} ${meses[parseInt(m) - 1]} ${y}`;
    }

    function todayISO() {
      return new Date().toISOString().split('T')[0];
    }

    function extractDocId(value) {
      const match = /\/d\/([a-zA-Z0-9_-]+)/.exec(value);
      return match ? match[1] : value;
    }

    // ── Cargar lista de alumnos ───────────────────────────────────────────────
    async function loadStudents() {
      const container = document.getElementById('students-container');
      try {
        const token = await getToken();
        const res = await fetch('/.netlify/functions/admin-users', {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (!res.ok) throw new Error(res.status);
        const users = await res.json();

        const students = users.filter(u => {
          const roles = u.app_metadata?.roles || [];
          return roles.includes('alumno') || u.app_metadata?.archivado;
        });

        const active   = students.filter(u => !u.app_metadata?.archivado);
        const archived = students.filter(u =>  u.app_metadata?.archivado);

        document.getElementById('admin-count').textContent = active.length ? `(${active.length})` : '';

        if (!active.length && !archived.length) {
          container.innerHTML = `
            <div class="empty-state" style="padding:3rem 0">
              <div class="empty-icon">👥</div>
              <div class="empty-title">Sin alumnos todavía</div>
              <p class="empty-text">Invitá al primer alumno en la pestaña "Invitar".</p>
            </div>`;
          return;
        }

        let html = active.length
          ? `<div class="student-list">${active.map(u => studentItem(u, false)).join('')}</div>`
          : `<div class="empty-state" style="padding:2rem 0">
               <div class="empty-icon">👥</div>
               <div class="empty-title">Sin alumnos activos</div>
             </div>`;

        if (archived.length) {
          html += `
            <div class="archived-toggle">
              <button class="archived-toggle-btn" id="btn-toggle-archived">
                Ver archivados (${archived.length})
                <span class="archived-chevron">›</span>
              </button>
            </div>
            <div class="student-list student-list--archived" id="archived-list" hidden>
              ${archived.map(u => studentItem(u, true)).join('')}
            </div>`;
        }

        container.innerHTML = html;
        initAccordion();

      } catch (err) {
        container.innerHTML = `<div class="empty-state" style="padding:3rem 0">
          <div class="empty-title">Error al cargar</div>
          <p class="empty-text" id="load-err-msg"></p>
        </div>`;
        document.getElementById('load-err-msg').textContent = err.message;
      }
    }

    // ── Render de item de acordeón ────────────────────────────────────────────
    function studentItem(u, isArchived = false) {
      const meta      = u.app_metadata || {};
      const name      = esc(u.user_metadata?.full_name || u.email);
      const uid       = esc(u.id);
      const historial = Array.isArray(meta.historialPeso) ? meta.historialPeso : [];

      return `
        <div class="student-item${isArchived ? ' student-item--archived' : ''}" data-id="${uid}" data-historial="${esc(JSON.stringify(historial))}">
          <button class="student-row" aria-expanded="false">
            <div class="student-row-info">
              <span class="student-name">${name}</span>
              <span class="student-email">${esc(u.email)}</span>
            </div>
            <span class="student-chevron">›</span>
          </button>
          <div class="student-body" hidden>

            <!-- Sub-tabs -->
            <div class="student-sub-tabs">
              <button class="student-tab-btn active" data-uid="${uid}" data-subtab="datos">Datos</button>
              <button class="student-tab-btn" data-uid="${uid}" data-subtab="rutina">Rutina</button>
              <button class="student-tab-btn" data-uid="${uid}" data-subtab="pesos">Pesos</button>
            </div>

            <!-- Panel: Datos -->
            <div class="student-tab-panel" data-subtab="datos">
              <div class="student-fields">
                <div class="field-group">
                  <label class="field-label" for="field-${uid}-docId">Google Doc</label>
                  <div class="field-input-row">
                    <input class="field-input" id="field-${uid}-docId" type="text" data-field="docId"
                      value="${esc(meta.docId || '')}" placeholder="Pegar ID o URL del documento" />
                    ${meta.docId
                      ? `<a class="btn-view-doc" href="https://docs.google.com/document/d/${esc(meta.docId)}/edit" target="_blank" rel="noopener noreferrer" title="Ver documento">↗</a>`
                      : ''}
                  </div>
                </div>
                <div class="field-group">
                  <label class="field-label" for="field-${uid}-servicio">Servicio</label>
                  <input class="field-input" id="field-${uid}-servicio" type="text" data-field="servicio"
                    value="${esc(meta.servicio || '')}" placeholder="Online 3x/semana" />
                </div>
                <div class="field-group">
                  <label class="field-label" for="field-${uid}-objetivo">Objetivo</label>
                  <input class="field-input" id="field-${uid}-objetivo" type="text" data-field="objetivo"
                    value="${esc(meta.objetivo || '')}" placeholder="Ganar masa muscular" />
                </div>
                <div class="field-group field-group--full">
                  <label class="field-label" for="field-${uid}-patologias">Patologías / condiciones</label>
                  <input class="field-input" id="field-${uid}-patologias" type="text" data-field="patologias"
                    value="${esc(meta.patologias || '')}" placeholder="Lumbalgia crónica, HTA..." />
                </div>
                <div class="field-group field-group--full">
                  <label class="field-label" for="field-${uid}-notas">Notas internas</label>
                  <input class="field-input" id="field-${uid}-notas" type="text" data-field="notas"
                    value="${esc(meta.notas || '')}" placeholder="Prefiere entrenar a la mañana..." />
                </div>
              </div>
              <div class="student-item-footer">
                <button class="btn-save student-save-btn" data-id="${uid}">Guardar</button>
                ${isArchived
                  ? `<button class="btn-secondary btn-secondary--success student-reactivate-btn" data-id="${uid}">Reactivar</button>`
                  : `<button class="btn-secondary btn-secondary--danger student-archive-btn" data-id="${uid}">Archivar</button>`
                }
                <span class="form-msg" id="msg-${uid}"></span>
              </div>
            </div>

            <!-- Panel: Rutina -->
            <div class="student-tab-panel" data-subtab="rutina" hidden>
              <div id="re-panel-${uid}"></div>
            </div>

            <!-- Panel: Pesos -->
            <div class="student-tab-panel" data-subtab="pesos" hidden>
              <div class="pesajes-section">
                <div class="pesajes-header">
                  <span class="section-label" style="margin:0">Historial de peso</span>
                  ${historial.length ? `<span class="pesajes-count">${historial.length} registro${historial.length !== 1 ? 's' : ''}</span>` : ''}
                </div>
                <div class="pesajes-list" id="pesajes-${uid}">
                  ${renderPesajesHTML(uid, historial)}
                </div>
                <div class="pesaje-add">
                  <input class="field-input field-input--peso" id="peso-input-${uid}"
                    type="number" placeholder="kg" step="0.1" min="0" />
                  <input class="field-input field-input--fecha" id="fecha-input-${uid}"
                    type="date" value="${todayISO()}" />
                  <button class="btn-save pesaje-add-btn" data-id="${uid}">+ Registrar</button>
                </div>
              </div>
            </div>

          </div>
        </div>`;
    }

    // ── Render lista de pesajes (HTML string) ─────────────────────────────────
    function renderPesajesHTML(uid, historial) {
      if (!historial.length) {
        return `<p class="pesaje-empty">Sin registros todavía.</p>`;
      }
      return [...historial]
        .map((entry, i) => ({ ...entry, _i: i }))
        .reverse()
        .map(entry => `
          <div class="pesaje-row">
            <span class="pesaje-fecha">${formatFecha(entry.fecha)}</span>
            <span class="pesaje-valor">${entry.peso} kg</span>
            <button class="pesaje-del" data-uid="${esc(uid)}" data-idx="${entry._i}" aria-label="Eliminar">×</button>
          </div>`)
        .join('');
    }

    // ── Actualizar lista de pesajes en el DOM ─────────────────────────────────
    function refreshPesajesList(uid, historial) {
      const item = document.querySelector(`.student-item[data-id="${uid}"]`);
      item.dataset.historial = JSON.stringify(historial);

      document.getElementById(`pesajes-${uid}`).innerHTML = renderPesajesHTML(uid, historial);

      const header = item.querySelector('.pesajes-header');
      let countEl  = header.querySelector('.pesajes-count');
      if (historial.length) {
        const text = `${historial.length} registro${historial.length !== 1 ? 's' : ''}`;
        if (!countEl) {
          countEl = document.createElement('span');
          countEl.className = 'pesajes-count';
          header.appendChild(countEl);
        }
        countEl.textContent = text;
      } else if (countEl) {
        countEl.remove();
      }
    }

    // ── Guardar historialPeso ─────────────────────────────────────────────────
    async function savePesajes(uid, historial) {
      const token = await getToken();
      const res = await fetch('/.netlify/functions/admin-users', {
        method: 'PUT',
        headers: {
          Authorization: `Bearer ${token}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ id: uid, historialPeso: historial }),
      });
      if (!res.ok) throw new Error(await res.text());
    }

    // ── Agregar pesaje ────────────────────────────────────────────────────────
    async function addPesaje(uid) {
      const item       = document.querySelector(`.student-item[data-id="${uid}"]`);
      const pesoInput  = document.getElementById(`peso-input-${uid}`);
      const fechaInput = document.getElementById(`fecha-input-${uid}`);
      const addBtn     = item.querySelector('.pesaje-add-btn');

      const peso  = parseFloat(pesoInput.value);
      const fecha = fechaInput.value;

      if (isNaN(peso) || peso <= 0) { pesoInput.focus(); return; }
      if (!fecha) { fechaInput.focus(); return; }

      const historial = JSON.parse(item.dataset.historial || '[]');
      historial.push({ fecha, peso });

      addBtn.disabled = true;
      addBtn.textContent = 'Guardando...';

      try {
        await savePesajes(uid, historial);
        refreshPesajesList(uid, historial);
        pesoInput.value = '';
      } catch (err) {
        historial.pop();
        alert(`Error al guardar: ${err.message}`);
      } finally {
        addBtn.disabled = false;
        addBtn.textContent = '+ Registrar';
      }
    }

    // ── Eliminar pesaje ───────────────────────────────────────────────────────
    async function deletePesaje(uid, idx) {
      const item     = document.querySelector(`.student-item[data-id="${uid}"]`);
      const historial = JSON.parse(item.dataset.historial || '[]');
      const removed  = historial.splice(idx, 1);

      try {
        await savePesajes(uid, historial);
        refreshPesajesList(uid, historial);
      } catch (err) {
        historial.splice(idx, 0, ...removed);
        alert(`Error al eliminar: ${err.message}`);
      }
    }

    // ── Archivar / reactivar alumno ───────────────────────────────────────────
    async function setArchived(id, value) {
      try {
        const token = await getToken();
        const res = await fetch('/.netlify/functions/admin-users', {
          method: 'PUT',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, archivado: value }),
        });
        if (!res.ok) throw new Error(await res.text());
        await loadStudents();
      } catch (err) {
        alert(`Error: ${err.message}`);
      }
    }

    // ── Guardar campos generales de un alumno ─────────────────────────────────
    async function saveStudent(id) {
      const item = document.querySelector(`.student-item[data-id="${id}"]`);
      const btn  = item.querySelector('.student-save-btn');
      const msg  = document.getElementById(`msg-${id}`);

      const payload = { id };
      item.querySelectorAll('[data-field]').forEach(input => {
        payload[input.dataset.field] = input.value.trim() || null;
      });

      btn.disabled = true;
      btn.textContent = 'Guardando...';
      msg.textContent = '';
      msg.className = 'form-msg';

      try {
        const token = await getToken();
        const res = await fetch('/.netlify/functions/admin-users', {
          method: 'PUT',
          headers: {
            Authorization: `Bearer ${token}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(payload),
        });
        if (!res.ok) throw new Error(await res.text());
        msg.textContent = '✓ Guardado';
        msg.classList.add('form-msg--ok');
      } catch (err) {
        msg.textContent = `Error: ${err.message}`;
        msg.classList.add('form-msg--err');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Guardar';
        setTimeout(() => { msg.textContent = ''; msg.className = 'form-msg'; }, 3000);
      }
    }

    // ══════════════════════════════════════════════════════════════════════════
    // ── Editor de rutinas ────────────────────────────────────────────────────
    // ══════════════════════════════════════════════════════════════════════════

    const routineStates = {};

    function emptyRoutine() {
      return {
        dias: [{ label: 'Día 1', movilidad: [], calor: [], principal: [] }],
        periodizacion: [],
      };
    }

    // ── Cargar rutina (lazy) ──────────────────────────────────────────────────
    async function loadRoutineTab(uid) {
      const panel = document.getElementById(`re-panel-${uid}`);
      panel.innerHTML = `<div class="loading-state" style="padding:3rem 0"><div class="spinner"></div><span>Cargando rutina...</span></div>`;

      try {
        const token = await getToken();
        const res = await fetch(`/.netlify/functions/routine-save?userId=${encodeURIComponent(uid)}`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (res.status === 404) {
          routineStates[uid] = emptyRoutine();
        } else if (res.ok) {
          routineStates[uid] = await res.json();
        } else {
          throw new Error(await res.text());
        }
      } catch (err) {
        panel.innerHTML = `<p class="re-error">Error al cargar la rutina: ${esc(err.message)}</p>`;
        return;
      }

      renderRoutineEditor(uid, 0);
    }

    // ── Sincronizar estado desde el DOM (antes de modificar estructura) ───────
    function syncRoutineStateFromDOM(uid) {
      const routine = routineStates[uid];
      if (!routine) return;

      routine.dias.forEach((dia, dayIdx) => {
        dia.movilidad.forEach((item, i) => {
          const row = document.querySelector(`.re-item-row[data-uid="${uid}"][data-day="${dayIdx}"][data-section="movilidad"][data-idx="${i}"]`);
          if (!row) return;
          item.nombre     = row.querySelector('[data-re-field="nombre"]')?.value.trim() || '';
          item.youtubeUrl = row.querySelector('[data-re-field="youtubeUrl"]')?.value.trim() || null;
        });
        dia.calor.forEach((item, i) => {
          const row = document.querySelector(`.re-item-row[data-uid="${uid}"][data-day="${dayIdx}"][data-section="calor"][data-idx="${i}"]`);
          if (!row) return;
          item.nombre = row.querySelector('[data-re-field="nombre"]')?.value.trim() || '';
        });
        dia.principal.forEach((item, i) => {
          const row = document.querySelector(`.re-ex-row[data-uid="${uid}"][data-day="${dayIdx}"][data-idx="${i}"]`);
          if (!row) return;
          item.nombre     = row.querySelector('[data-re-field="nombre"]')?.value.trim() || '';
          item.series     = parseInt(row.querySelector('[data-re-field="series"]')?.value) || null;
          item.reps       = parseInt(row.querySelector('[data-re-field="reps"]')?.value) || null;
          const pesoVal   = row.querySelector('[data-re-field="peso"]')?.value;
          item.peso       = pesoVal !== '' ? parseFloat(pesoVal) || null : null;
          item.nota       = row.querySelector('[data-re-field="nota"]')?.value.trim() || null;
          item.youtubeUrl = row.querySelector('[data-re-field="youtubeUrl"]')?.value.trim() || null;
          item.unidad     = row.dataset.unidad     || 'reps';
          item.pesoUnidad = row.dataset.pesoUnidad || 'kg';
        });
      });

      routine.periodizacion.forEach((item, i) => {
        const row = document.querySelector(`.re-period-row[data-uid="${uid}"][data-idx="${i}"]`);
        if (!row) return;
        item.descripcion = row.querySelector('[data-re-field="descripcion"]')?.value.trim() || '';
      });
    }

    // ── Render: editor completo ───────────────────────────────────────────────
    function renderRoutineEditor(uid, activeDayIdx = 0) {
      const routine = routineStates[uid];
      const panel   = document.getElementById(`re-panel-${uid}`);

      const maxDays    = 6;
      const canAddDay  = routine.dias.length < maxDays;
      const dayTabsHTML = routine.dias.map((dia, i) =>
        `<button class="re-day-btn${i === activeDayIdx ? ' active' : ''}" data-uid="${uid}" data-day="${i}">${esc(dia.label)}</button>`
      ).join('') + (canAddDay
        ? `<button class="re-add-day-btn" data-uid="${uid}" title="Agregar día">+</button>`
        : '');

      const dayPanelsHTML = routine.dias.map((dia, i) => `
        <div class="re-day-panel${i === activeDayIdx ? '' : ' re-day-panel--hidden'}" data-uid="${uid}" data-day="${i}">
          <div class="re-section">
            <div class="re-section-label">Movilidad</div>
            <div id="re-movilidad-${uid}-${i}">${renderMovilidadItems(uid, i)}</div>
            <button class="re-add-btn re-add-mov-btn" data-uid="${uid}" data-day="${i}">+ Agregar</button>
          </div>
          <div class="re-section">
            <div class="re-section-label">Entrada en calor</div>
            <div id="re-calor-${uid}-${i}">${renderCalorItems(uid, i)}</div>
            <button class="re-add-btn re-add-calor-btn" data-uid="${uid}" data-day="${i}">+ Agregar</button>
          </div>
          <div class="re-section">
            <div class="re-section-label">Parte principal</div>
            <div id="re-principal-${uid}-${i}">${renderPrincipalItems(uid, i)}</div>
            <button class="re-add-btn re-add-ex-btn" data-uid="${uid}" data-day="${i}">+ Agregar ejercicio</button>
          </div>
        </div>`).join('');

      panel.innerHTML = `
        <div class="re-editor">
          <div class="re-day-tabs">${dayTabsHTML}</div>
          ${dayPanelsHTML}
          <div class="re-section re-period-section">
            <div class="re-section-label">Periodización</div>
            <div id="re-period-${uid}">${renderPeriodItems(uid)}</div>
            <button class="re-add-btn re-add-period-btn" data-uid="${uid}">+ Agregar semana</button>
          </div>
          <div class="re-footer">
            <button class="btn-save re-save-btn" data-uid="${uid}">Guardar rutina</button>
            <span class="form-msg" id="re-msg-${uid}"></span>
          </div>
        </div>`;
    }

    // ── Render: sección movilidad ─────────────────────────────────────────────
    function renderMovilidadItems(uid, dayIdx) {
      const items = routineStates[uid].dias[dayIdx].movilidad;
      if (!items.length) return `<p class="re-empty">Sin ejercicios de movilidad.</p>`;
      return items.map((item, i) => `
        <div class="re-item-row" data-uid="${uid}" data-day="${dayIdx}" data-section="movilidad" data-idx="${i}">
          <input class="field-input re-field-md" type="text" placeholder="Nombre del ejercicio"
            value="${esc(item.nombre)}" data-re-field="nombre" />
          <input class="field-input re-field-lg" type="url" placeholder="URL YouTube (opcional)"
            value="${esc(item.youtubeUrl || '')}" data-re-field="youtubeUrl" />
          <button class="re-del-btn" data-uid="${uid}" data-day="${dayIdx}" data-section="movilidad" data-idx="${i}" aria-label="Eliminar">×</button>
        </div>`).join('');
    }

    // ── Render: sección calor ─────────────────────────────────────────────────
    function renderCalorItems(uid, dayIdx) {
      const items = routineStates[uid].dias[dayIdx].calor;
      if (!items.length) return `<p class="re-empty">Sin ejercicios de calor.</p>`;
      return items.map((item, i) => `
        <div class="re-item-row" data-uid="${uid}" data-day="${dayIdx}" data-section="calor" data-idx="${i}">
          <input class="field-input re-field-md" type="text" placeholder="Nombre del ejercicio"
            value="${esc(item.nombre)}" data-re-field="nombre" />
          <button class="re-del-btn" data-uid="${uid}" data-day="${dayIdx}" data-section="calor" data-idx="${i}" aria-label="Eliminar">×</button>
        </div>`).join('');
    }

    // ── Render: sección principal ─────────────────────────────────────────────
    function renderPrincipalItems(uid, dayIdx) {
      const items = routineStates[uid].dias[dayIdx].principal;
      if (!items.length) return `<p class="re-empty">Sin ejercicios.</p>`;
      return items.map((item, i) => {
        const hasExtra = item.nota || item.youtubeUrl;
        return `
        <div class="re-ex-row" data-uid="${uid}" data-day="${dayIdx}" data-idx="${i}"
          data-unidad="${esc(item.unidad || 'reps')}" data-peso-unidad="${esc(item.pesoUnidad || 'kg')}">
          <div class="re-ex-main">
            <input class="field-input re-field-md" type="text" placeholder="Nombre del ejercicio"
              value="${esc(item.nombre)}" data-re-field="nombre" />
            <input class="field-input re-field-xs" type="number" placeholder="S" min="1"
              value="${item.series ?? ''}" data-re-field="series" title="Series" />
            <span class="re-x">×</span>
            <input class="field-input re-field-xs" type="number" placeholder="R" min="1"
              value="${item.reps ?? ''}" data-re-field="reps" title="Repeticiones" />
            <button class="re-toggle re-toggle-unidad" data-uid="${uid}" data-day="${dayIdx}" data-idx="${i}"
              title="Cambiar unidad">${esc(item.unidad || 'reps')}</button>
            <input class="field-input re-field-sm" type="number" placeholder="Peso" min="0" step="0.5"
              value="${item.peso ?? ''}" data-re-field="peso" title="Peso" />
            <button class="re-toggle re-toggle-peso" data-uid="${uid}" data-day="${dayIdx}" data-idx="${i}"
              title="Cambiar unidad de peso">${esc(item.pesoUnidad || 'kg')}</button>
            <button class="re-del-btn" data-uid="${uid}" data-day="${dayIdx}" data-section="principal" data-idx="${i}" aria-label="Eliminar">×</button>
          </div>
          <div class="re-ex-extra${hasExtra ? '' : ' re-ex-extra--hidden'}">
            <input class="field-input" type="text" placeholder="Nota (ej: por lado)"
              value="${esc(item.nota || '')}" data-re-field="nota" style="flex:1" />
            <input class="field-input" type="url" placeholder="URL YouTube"
              value="${esc(item.youtubeUrl || '')}" data-re-field="youtubeUrl" style="flex:1" />
          </div>
          <button class="re-ex-expand-btn" data-uid="${uid}" data-day="${dayIdx}" data-idx="${i}">
            ${hasExtra ? '▲ menos' : '▼ nota/url'}
          </button>
        </div>`;
      }).join('');
    }

    // ── Render: periodización ─────────────────────────────────────────────────
    function renderPeriodItems(uid) {
      const items = routineStates[uid].periodizacion;
      if (!items.length) return `<p class="re-empty">Sin periodización definida.</p>`;
      return items.map((item, i) => `
        <div class="re-item-row re-period-row" data-uid="${uid}" data-idx="${i}">
          <span class="re-period-label">Sem ${item.semana}</span>
          <input class="field-input re-field-md" type="text" placeholder="Descripción de la semana"
            value="${esc(item.descripcion)}" data-re-field="descripcion" />
          <button class="re-del-period-btn re-del-btn" data-uid="${uid}" data-idx="${i}" aria-label="Eliminar">×</button>
        </div>`).join('');
    }

    // ── Guardar rutina ────────────────────────────────────────────────────────
    async function saveRoutine(uid) {
      const btn = document.querySelector(`.re-save-btn[data-uid="${uid}"]`);
      const msg = document.getElementById(`re-msg-${uid}`);

      syncRoutineStateFromDOM(uid);
      const routine = routineStates[uid];

      btn.disabled = true;
      btn.textContent = 'Guardando...';
      msg.textContent = '';
      msg.className = 'form-msg';

      try {
        const token = await getToken();
        const res = await fetch('/.netlify/functions/routine-save', {
          method: 'PUT',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: uid, routine }),
        });
        if (!res.ok) throw new Error(await res.text());
        msg.textContent = '✓ Guardado';
        msg.classList.add('form-msg--ok');
      } catch (err) {
        msg.textContent = `Error: ${err.message}`;
        msg.classList.add('form-msg--err');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Guardar rutina';
        setTimeout(() => { msg.textContent = ''; msg.className = 'form-msg'; }, 3000);
      }
    }

    // ── Invitar nuevo alumno ──────────────────────────────────────────────────
    document.getElementById('invite-form').addEventListener('submit', async e => {
      e.preventDefault();
      const form      = e.target;
      const btn       = document.getElementById('btn-invite');
      const msg       = document.getElementById('invite-msg');
      const email     = form.email.value.trim();
      const full_name = form.full_name.value.trim();

      btn.disabled = true;
      btn.textContent = 'Enviando...';
      msg.textContent = '';
      msg.className = 'form-msg';

      try {
        const token = await getToken();
        const res = await fetch('/.netlify/functions/admin-users', {
          method: 'POST',
          headers: {
            Authorization: `Bearer ${token}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ email, full_name }),
        });
        if (!res.ok) throw new Error(await res.text());
        msg.textContent = `✓ Invitación enviada a ${email}`;
        msg.classList.add('form-msg--ok');
        form.reset();
        await loadStudents();
        document.querySelector('.tab-btn[data-tab="alumnos"]').click();
      } catch (err) {
        msg.textContent = `Error: ${err.message}`;
        msg.classList.add('form-msg--err');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Enviar invitación';
        setTimeout(() => { msg.textContent = ''; msg.className = 'form-msg'; }, 4000);
      }
    });
  </script>

</body>
</html>
