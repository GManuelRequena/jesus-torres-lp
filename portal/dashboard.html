<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi Rutina — Jesús Torres</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏋️</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="portal.css"/>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">Jesús Torres · EP</a>
    <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
  </nav>

  <main class="dashboard-page" id="dashboard" style="display:none">

    <div class="dashboard-header fade-in">
      <div class="dashboard-greeting">Bienvenido/a</div>
      <div class="dashboard-title">HOLA, <span id="user-name">...</span></div>
      <p class="dashboard-subtitle">Aquí encontrás tu rutina actualizada por Jesús.</p>
    </div>

    <div class="routine-card fade-in" id="routine-card">
      <div class="routine-card-header">
        <div class="routine-card-dot"></div>
        <div class="routine-card-title">Tu Rutina</div>
      </div>
      <div id="routine-body">
        <!-- contenido dinámico -->
      </div>
    </div>

  </main>

  <script>
    const WA_NUMBER = '5492657234696'; // reemplazar con número real

    netlifyIdentity.init();

    netlifyIdentity.on('init', user => {
      if (!user) {
        window.location.href = '/portal/';
        return;
      }
      const roles = user.app_metadata?.roles || [];
      if (!roles.includes('alumno') && !roles.includes('admin')) {
        showAccessDenied();
        return;
      }
      renderDashboard(user);
    });

    document.getElementById('btn-logout').addEventListener('click', () => {
      netlifyIdentity.logout();
    });

    netlifyIdentity.on('logout', () => {
      window.location.href = '/portal/';
    });

    function showAccessDenied() {
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('routine-card').style.display = 'none';
      document.querySelector('.dashboard-header').innerHTML = `
        <div class="empty-state" style="padding: 4rem 0">
          <div class="empty-icon">🔒</div>
          <div class="empty-title">Sin acceso</div>
          <p class="empty-text">Tu cuenta no tiene acceso al portal todavía.<br/>Contactá a Jesús para activarla.</p>
          <a class="empty-wa" href="https://wa.me/${WA_NUMBER}" target="_blank" rel="noopener noreferrer">💬 Escribir por WhatsApp</a>
        </div>`;
    }

    async function renderDashboard(user) {
      const fullName = user.user_metadata?.full_name || '';
      const nombre   = fullName.split(' ')[0] || user.email.split('@')[0];
      document.getElementById('user-name').textContent = nombre.toUpperCase();
      document.getElementById('dashboard').style.display = 'block';

      const body = document.getElementById('routine-body');
      body.innerHTML = `<div class="loading-state"><div class="spinner"></div><span>Cargando tu rutina...</span></div>`;

      // 1. Obtener docId del alumno desde routines.json
      let docId = null;
      try {
        const res = await fetch('/routines.json');
        const routines = await res.json();
        const docUrl = routines[user.email] || null;
        if (docUrl) {
          const match = docUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
          docId = match ? match[1] : null;
        }
      } catch (_) {}

      if (!docId) {
        body.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📋</div>
            <div class="empty-title">Rutina en preparación</div>
            <p class="empty-text">
              Jesús todavía no cargó tu rutina.<br/>
              Escribile para coordinar.
            </p>
            <a class="empty-wa" href="https://wa.me/${WA_NUMBER}" target="_blank" rel="noopener noreferrer">
              💬 Escribir por WhatsApp
            </a>
          </div>`;
        return;
      }

      // 2. Fetchear y parsear la rutina via Netlify Function
      let routine = null;
      try {
        const res = await fetch(`/.netlify/functions/routine?docId=${docId}`);
        if (!res.ok) throw new Error(res.status);
        routine = await res.json();
      } catch (_) {}

      if (!routine || !routine.dias?.length) {
        body.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚠️</div>
            <div class="empty-title">No se pudo cargar</div>
            <p class="empty-text">
              Hubo un error al leer tu rutina.<br/>
              Intentá recargar la página.
            </p>
          </div>`;
        return;
      }

      // 3. Renderizar
      body.innerHTML = renderRoutine(routine);
      initTabs();
    }

    // ── Render ────────────────────────────────────────────────────────────────

    function renderRoutine(routine) {
      const tabs = routine.dias.map((dia, i) =>
        `<button class="tab-btn${i === 0 ? ' active' : ''}" data-tab="${i}">${dia.label.toUpperCase()}</button>`
      ).join('');

      const panels = routine.dias.map((dia, i) =>
        `<div class="tab-panel${i === 0 ? ' active' : ''}" data-panel="${i}">
          ${renderMovilidad(dia.movilidad)}
          ${renderCalor(dia.calor)}
          ${renderPrincipal(dia.principal)}
        </div>`
      ).join('');

      const periodo = renderPeriodizacion(routine.periodizacion);

      return `
        <div class="tabs">${tabs}</div>
        <div class="tab-panels">${panels}</div>
        ${periodo}
      `;
    }

    function renderMovilidad(items) {
      if (!items.length) return '';
      const cards = items.map(ex => `
        <div class="ex-card ex-card--movilidad">
          <div class="ex-movilidad-nombre">${ex.nombre}</div>
          ${ex.youtubeUrl
            ? `<a class="btn-video" href="${ex.youtubeUrl}" target="_blank" rel="noopener noreferrer">▶ VER VIDEO</a>`
            : ''}
        </div>`).join('');
      return `
        <div class="routine-section">
          <div class="section-label">Movilidad Articular</div>
          <div class="ex-list">${cards}</div>
        </div>`;
    }

    function renderCalor(items) {
      if (!items.length) return '';
      const pills = items.map(ex =>
        `<span class="calor-pill">${ex.nombre}</span>`
      ).join('');
      return `
        <div class="routine-section">
          <div class="section-label">Entrada en Calor <span class="section-sub">2×8</span></div>
          <div class="calor-pills">${pills}</div>
        </div>`;
    }

    function renderPrincipal(items) {
      if (!items.length) return '';
      const cards = items.map(ex => {
        const num    = String(ex.num).padStart(2, '0');
        const serRep = `${ex.series}×${ex.reps}${ex.unidad === 'seg' ? '"' : ''}`;
        const peso   = ex.peso !== null ? `<span class="badge badge--peso">${ex.peso}${ex.pesoUnidad === 'lingotes' ? ' ling.' : 'kg'}</span>` : '';
        const nota   = ex.nota ? `<span class="ex-nota">${ex.nota}</span>` : '';
        const video  = ex.youtubeUrl ? `<a class="btn-video" href="${ex.youtubeUrl}" target="_blank" rel="noopener noreferrer">▶ VER VIDEO</a>` : '';
        return `
          <div class="ex-card ex-card--principal">
            <span class="ex-num">${num}</span>
            <span class="ex-nombre">${ex.nombre}${nota}</span>
            <div class="ex-badges">
              <span class="badge badge--serep">${serRep}</span>
              ${peso}
              ${video}
            </div>
          </div>`;
      }).join('');
      return `
        <div class="routine-section">
          <div class="section-label">Parte Principal</div>
          <div class="ex-list ex-list--principal">${cards}</div>
        </div>`;
    }

    function renderPeriodizacion(items) {
      if (!items.length) return '';
      const rows = items.map((s, i) => `
        <div class="periodo-row">
          <span class="periodo-semana">SEM ${s.semana ?? i + 1}</span>
          <span class="periodo-desc">${s.descripcion}</span>
        </div>`).join('');
      return `
        <div class="routine-section routine-section--periodo">
          <div class="section-label">Periodización</div>
          <div class="periodo-table">${rows}</div>
        </div>`;
    }

    // ── Tabs ──────────────────────────────────────────────────────────────────

    function initTabs() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = btn.dataset.tab;
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          document.querySelector(`.tab-panel[data-panel="${idx}"]`).classList.add('active');
        });
      });
    }
  </script>

</body>
</html>
